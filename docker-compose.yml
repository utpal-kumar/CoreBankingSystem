version: '3.8'

services:
  cbs-backend:
    image: eclipse-temurin:17-jdk
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8080:8080"
    command: sh -c "apt-get update && apt-get install -y maven && mvn spring-boot:run"

  cbs-frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
